# Rahi PowerSync sync rules — versioned with the schema (rahi-docs/04 §7, /05 §2).
#
# Two bucket families:
#   user   — everything owned by the authenticated user (1 bucket per user).
#   group  — shared data for each group the user belongs to (1 bucket per group).
#
# Scoping keys live directly on each table (owner_id / group_id / trip_id) so no
# joins are needed in data queries (PowerSync constraint). Child tables that
# lacked a direct key were denormalized in migration 0002 (expense_shares.group_id,
# kitty_contributions.group_id).
#
# Read-only on device: routes, tile_packs, poi_corridor_sync, subscriptions,
# entitlements. The client never writes these (enforced by RLS — rahi-docs/10).
# POIs themselves sync via the Phase 3 corridor pipeline (rahi-docs/07); Phase 1
# syncs the trip-scoped poi_corridor_sync join only.

bucket_definitions:
  # ---------------------------------------------------------------------------
  # user bucket — the rider's own data.
  # ---------------------------------------------------------------------------
  user:
    parameters: SELECT request.user_id() AS user_id
    data:
      - SELECT * FROM profiles WHERE id = bucket.user_id
      - SELECT * FROM bikes WHERE owner_id = bucket.user_id
      - SELECT * FROM emergency_contacts WHERE owner_id = bucket.user_id
      - SELECT * FROM trips WHERE owner_id = bucket.user_id
      - SELECT * FROM fuel_logs WHERE bike_id IN (SELECT id FROM bikes WHERE owner_id = bucket.user_id)
      - SELECT * FROM sos_events WHERE owner_id = bucket.user_id
      - SELECT * FROM documents WHERE owner_id = bucket.user_id
      - SELECT * FROM badges WHERE owner_id = bucket.user_id
      # Subscription / entitlement gate — PULL ONLY (server-authoritative).
      - SELECT * FROM subscriptions WHERE owner_id = bucket.user_id
      - SELECT * FROM entitlements WHERE owner_id = bucket.user_id

  # ---------------------------------------------------------------------------
  # group bucket — shared data for each group the user is a member of.
  # The parameter query yields one bucket row per group, carrying both group_id
  # and the group's trip_id so trip-scoped child data needs no join.
  # ---------------------------------------------------------------------------
  group:
    parameters: >
      SELECT g.id AS group_id, g.trip_id AS trip_id
      FROM group_members gm
      JOIN groups g ON g.id = gm.group_id
      WHERE gm.profile_id = request.user_id() AND gm.deleted_at IS NULL
    data:
      - SELECT * FROM groups WHERE id = bucket.group_id
      - SELECT * FROM group_members WHERE group_id = bucket.group_id
      - SELECT * FROM trips WHERE id = bucket.trip_id
      - SELECT * FROM expenses WHERE group_id = bucket.group_id
      - SELECT * FROM expense_shares WHERE group_id = bucket.group_id
      - SELECT * FROM kitty WHERE group_id = bucket.group_id
      - SELECT * FROM kitty_contributions WHERE group_id = bucket.group_id
      - SELECT * FROM settlements WHERE group_id = bucket.group_id
      # Read-only geo for the trip (server-authoritative).
      - SELECT * FROM routes WHERE trip_id = bucket.trip_id
      - SELECT * FROM tile_packs WHERE trip_id = bucket.trip_id
      - SELECT * FROM poi_corridor_sync WHERE trip_id = bucket.trip_id
      - SELECT * FROM track_points WHERE trip_id = bucket.trip_id
      - SELECT * FROM recaps WHERE trip_id = bucket.trip_id
      # Convoy live positions + regroup pins (Phase 7) — group-scoped, writable.
      - SELECT * FROM convoy_positions WHERE group_id = bucket.group_id
      - SELECT * FROM regroup_points WHERE group_id = bucket.group_id
      # Group chat (Phase 8) — append-only, carried over mesh + cloud.
      - SELECT * FROM group_messages WHERE group_id = bucket.group_id
